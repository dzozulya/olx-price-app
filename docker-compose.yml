services:

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: olx-price-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    depends_on:
      - postgres
      - redis
    networks:
      - olx-network

  nginx:
    image: nginx
    container_name: olx-price-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - olx-network

  postgres:
    image: postgres:17
    container_name: olx-price-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: olx_tracker
      POSTGRES_USER: test1234
      POSTGRES_PASSWORD: test1234
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - olx-network

  redis:
    image: redis:7-alpine
    container_name: olx-price-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - olx-network

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: olx-price-queue
    working_dir: /var/www
    command: php artisan queue:work --tries=3
    volumes:
      - ./:/var/www
    depends_on:
      - redis
      - postgres

    networks:
      - olx-network

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: olx-price-scheduler
    working_dir: /var/www
    command: sh -c "while true; do php artisan schedule; sleep 60; done"
    volumes:
      - ./:/var/www
    depends_on:
      - redis
      - postgres
    networks:
      - olx-network

volumes:
  postgres_data:

networks:
  olx-network:
    driver: bridge
